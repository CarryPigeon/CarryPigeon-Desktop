[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "bzip2-1.0.6",
    "zlib-acknowledgement",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = [
    { name = "zip", reason = "zip 8.x used directly for plugin package extraction; multiple versions allowed." },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"

