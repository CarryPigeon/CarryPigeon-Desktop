name: Build, test, audit, and release Tauri App with pnpm
on:
    push:
        branches: [master, release]
    workflow_dispatch:

jobs:
    quality-gates:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Install Linux dependencies
              run: |
                  sudo apt update
                  sudo apt install libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl \
                    wget \
                    file \
                    libxdo-dev \
                    libssl-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"
                  cache: "pnpm"

            - name: Install frontend dependencies with pnpm
              run: pnpm install --frozen-lockfile

            - name: Install cargo-audit
              run: cargo install --locked cargo-audit --version 0.22.1

            - name: Install cargo-deny
              run: cargo install --locked cargo-deny --version 0.19.4

            - name: Run frontend lint checks
              run: pnpm run lint

            - name: Run frontend production build
              run: pnpm run build

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1

            - name: Run cargo audit
              run: cargo audit

            - name: Run cargo deny
              run: cargo deny check

    build-tauri:
        needs: quality-gates
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                platform: [macos-latest, ubuntu-latest, windows-latest]
        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-latest'
              run: |
                  sudo apt update
                  sudo apt install libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl \
                    wget \
                    file \
                    libxdo-dev \
                    libssl-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            # 修复：在Action中指定pnpm版本
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"
                  cache: "pnpm"

            - name: Install frontend dependencies with pnpm
              run: pnpm install --frozen-lockfile

            - name: Build and Release with Tauri Action
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: v__VERSION__
                  releaseName: "App Release v__VERSION__"
                  releaseBody: "Automated build with pnpm."
                  releaseDraft: true
                  prerelease: false
